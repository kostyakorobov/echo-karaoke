<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эхо Караоке — Плеер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Now playing + queue panel (right side) */
        .now-queue {
            text-align: right;
            min-width: 0;
        }
        .now-current {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }
        .now-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #a855f7;
            flex-shrink: 0;
            animation: pulse-dot 2s infinite;
        }
        .now-title {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .now-meta {
            font-size: 13px;
            color: #a3a3a3;
            margin-top: 2px;
        }
        .now-meta .singer-name { color: #c084fc; }
        .queue-list {
            margin-top: 6px;
            border-top: 1px solid #1a1a1a;
            padding-top: 6px;
        }
        .queue-list-item {
            font-size: 12px;
            color: #525252;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.6;
        }
        .queue-list-item .q-pos {
            color: #404040;
            margin-right: 6px;
        }
        .queue-list-item .q-song { color: #737373; }
        .queue-list-item .q-singer { color: #a855f7; font-size: 11px; }

        /* Queue indicator */
        .queue-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 20px;
            font-size: 13px;
            color: #d4d4d4;
        }
        .queue-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Lyrics */
        .lyrics-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 60px;
            position: relative;
            min-height: 0;
        }
        /* Particle canvas behind lyrics */
        .fx-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .line, .singer, .idle {
            position: relative;
            z-index: 1;
        }
        /* Reactive glow — driven by JS */
        .reactive-glow {
            position: absolute;
            width: 700px; height: 700px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle, rgba(168, 85, 247, var(--glow-opacity, 0.1)) 0%, transparent 70%);
            transition: opacity 0.1s;
        }
        .line {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.5;
            text-align: center;
            max-width: 900px;
            transition: opacity 0.8s ease;
        }
        .line.active { opacity: 1; }

        .word {
            display: inline;
            position: relative;
            color: #666666;
        }
        .word.sung { color: #ffffff; }
        /* Per-character fill via gradient mask */
        .word.now {
            color: #666666;
            background: linear-gradient(90deg, #fff var(--fill), #666666 var(--fill));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, calc(0.7 * var(--fill-num))));
        }

        /* Singer name */
        .singer {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 14px;
            color: #a3a3a3;
        }
        .singer span { color: #c084fc; font-weight: 600; }

        /* Controls */
        .controls {
            flex-shrink: 0;
            padding: 16px 40px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .progress-wrap { width: 100%; max-width: 700px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: #404040;
            border-radius: 3px;
            cursor: pointer;
        }
        .progress-bar:hover { height: 8px; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border-radius: 3px;
            width: 0%;
            pointer-events: none;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px; color: #a3a3a3;
            font-variant-numeric: tabular-nums;
            margin-top: 4px;
        }
        .buttons {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .btn {
            background: none; border: none;
            color: #a3a3a3; cursor: pointer;
            padding: 8px; transition: color 0.2s;
        }
        .btn:hover { color: #fff; }
        .btn-play {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #fff;
            color: #0a0a0a !important;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
        }
        .btn-play:hover { background: #d4d4d4; }

        /* Idle */
        .idle {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a0a; z-index: 10;
            transition: opacity 0.6s ease;
        }
        .idle.hidden { opacity: 0; pointer-events: none; }
        .idle h1 {
            font-size: 72px; font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .idle p { color: #a3a3a3; font-size: 18px; margin-top: 12px; }
        .idle .waiting { color: #c084fc; font-size: 16px; margin-top: 24px; }

        /* Congrats + Countdown overlay */
        .overlay-screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a0a;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .overlay-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        /* Congrats */
        .congrats-emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }
        @keyframes congrats-bounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .congrats-singer {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .congrats-song {
            font-size: 20px;
            color: #a3a3a3;
            font-weight: 500;
        }
        .congrats-label {
            font-size: 14px;
            color: #525252;
            margin-top: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Countdown */
        .countdown-number {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            animation: countdown-pop 1s ease;
        }
        @keyframes countdown-pop {
            0% { transform: scale(1.5); opacity: 0; }
            30% { transform: scale(1); opacity: 1; }
            100% { opacity: 1; }
        }
        .countdown-next-label {
            font-size: 14px;
            color: #525252;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 32px;
        }
        .countdown-next-song {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-top: 8px;
        }
        .countdown-next-artist {
            font-size: 18px;
            color: #a3a3a3;
            margin-top: 4px;
        }
        .countdown-next-singer {
            font-size: 18px;
            color: #c084fc;
            font-weight: 600;
            margin-top: 8px;
        }
        .countdown-handoff {
            font-size: 16px;
            color: #737373;
            margin-top: 20px;
            font-style: italic;
        }

        /* Interlude / intro overlay */
        .interlude {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .interlude.visible { opacity: 1; }
        .interlude-label {
            font-size: 16px;
            color: #525252;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .interlude-ring {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid #262626;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .interlude-ring.fade-out { opacity: 0; }
        .interlude-ring svg {
            position: absolute;
            inset: -3px;
            width: calc(100% + 6px);
            height: calc(100% + 6px);
            transform: rotate(-90deg);
        }
        .interlude-ring circle.progress-ring {
            fill: none;
            stroke: url(#interludeGrad);
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease;
        }
        .interlude-timer {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.3s;
        }
        .interlude-countdown {
            position: absolute;
            z-index: 2;
            font-size: 100px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .interlude-countdown.visible { opacity: 1; }

        /* Toast notification */
        .player-toast {
            position: fixed;
            top: 80px;
            right: 40px;
            padding: 16px 24px;
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 14px;
            z-index: 50;
            opacity: 0;
            transform: translateX(40px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            max-width: 360px;
        }
        .player-toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        .player-toast-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #a855f7;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .player-toast-song {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }
        .player-toast-detail {
            font-size: 13px;
            color: #a3a3a3;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ЭХО.КАРАОКЕ</div>
        <div class="queue-badge">
            <div class="queue-dot"></div>
            <span id="roomId">Зал не выбран</span>
        </div>
        <div class="now-queue" id="nowQueue">
            <div class="now-current">
                <div class="now-dot" id="nowDot" style="display:none"></div>
                <div class="now-title" id="title">—</div>
            </div>
            <div class="now-meta" id="nowMeta"></div>
            <div class="queue-list" id="queueList"></div>
        </div>
    </div>

    <div class="lyrics-area">
        <canvas class="fx-canvas" id="fxCanvas"></canvas>
        <div class="reactive-glow" id="reactiveGlow"></div>
        <div class="idle" id="idle">
            <h1>ЭХО</h1>
            <p>Ожидание треков в очереди...</p>
            <div class="waiting" id="idleStatus"></div>
        </div>
        <div class="line active" id="line1"></div>
        <div class="singer" id="singer"></div>

        <!-- Interlude overlay (intro + between verses) -->
        <div class="interlude" id="interlude">
            <div class="interlude-ring">
                <svg viewBox="0 0 146 146">
                    <defs>
                        <linearGradient id="interludeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#a855f7"/>
                            <stop offset="100%" stop-color="#ec4899"/>
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring" id="interludeRing" cx="73" cy="73" r="70"
                            stroke-dasharray="440" stroke-dashoffset="440"/>
                </svg>
                <div class="interlude-timer" id="interludeTimer"></div>
            </div>
            <div class="interlude-countdown" id="interludeCountdown"></div>
        </div>

        <!-- Congrats overlay -->
        <div class="overlay-screen" id="congratsScreen">
            <canvas class="fx-canvas" id="congratsCanvas" style="z-index:0;"></canvas>
            <div class="congrats-emoji" id="congratsEmoji" style="position:relative;z-index:1;"></div>
            <div class="congrats-singer" id="congratsSinger" style="position:relative;z-index:1;"></div>
            <div class="congrats-song" id="congratsSong" style="position:relative;z-index:1;"></div>
            <div class="congrats-label" style="position:relative;z-index:1;">Отличное выступление!</div>
        </div>

        <!-- Countdown overlay -->
        <div class="overlay-screen" id="countdownScreen">
            <div class="countdown-number" id="countdownNumber"></div>
            <div class="countdown-next-label">Следующая песня</div>
            <div class="countdown-next-song" id="countdownSong"></div>
            <div class="countdown-next-artist" id="countdownArtist"></div>
            <div class="countdown-next-singer" id="countdownSinger"></div>
            <div class="countdown-handoff" id="countdownHandoff"></div>
        </div>
    </div>

    <!-- Toast for queue additions -->
    <div class="player-toast" id="playerToast">
        <div class="player-toast-label">Добавлено в очередь</div>
        <div class="player-toast-song" id="toastSong"></div>
        <div class="player-toast-detail" id="toastDetail"></div>
    </div>

    <div class="controls">
        <div class="progress-wrap">
            <div class="progress-bar" id="bar">
                <div class="progress-fill" id="fill"></div>
            </div>
            <div class="time-row">
                <span id="cur">0:00</span>
                <span id="dur">0:00</span>
            </div>
        </div>
        <div class="buttons">
            <button class="btn" id="restart">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="btn btn-play" id="play">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="iPlay"><polygon points="9,5 20,12 9,19"/></svg>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="iPause" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="btn" id="skip">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <audio id="audio" preload="auto"></audio>

    <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://uefvicwsbkjsbvfdhebj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZnZpY3dzYmtqc2J2ZmRoZWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAxNDg0ODksImV4cCI6MjA3NTcyNDQ4OX0.53_b0KI7DUwI4SzFXNoIDbIgm5N1qwhnppx6WmP-FX0';
    const ROOM_ID = new URLSearchParams(window.location.search).get('room') || 'hall_1';
    const WORDS_PER_LINE = 7;

    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    const audio = document.getElementById('audio');
    let lines = [];
    let currentSong = null;
    let toastTimer = null;

    // --- Toast notification ---
    function showPlayerToast(title, artist, userName) {
        document.getElementById('toastSong').textContent = title;
        document.getElementById('toastDetail').textContent =
            (artist ? artist + ' — ' : '') + (userName ? `Поёт: ${userName}` : '');
        const toast = document.getElementById('playerToast');
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // --- Queue display in header ---
    async function updateQueueDisplay() {
        const { data: items } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(title, artist)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true })
            .limit(5);

        const container = document.getElementById('queueList');
        if (!items || items.length === 0) {
            container.innerHTML = '';
            return;
        }

        container.innerHTML = items.map((item, i) => {
            const title = item.karaoke_songs?.title || '—';
            const artist = item.karaoke_songs?.artist || '';
            const singer = item.user_name || '';
            return `<div class="queue-list-item">` +
                `<span class="q-pos">${i + 1}.</span>` +
                `<span class="q-song">${artist} — ${title}</span>` +
                (singer ? ` <span class="q-singer">${singer}</span>` : '') +
                `</div>`;
        }).join('');
    }

    document.getElementById('roomId').textContent = ROOM_ID;

    // --- Load a song by ID ---
    async function loadSong(songId, userName) {
        const { data: song } = await sb.from('karaoke_songs').select('*').eq('id', songId).single();
        if (!song) return;

        currentSong = song;
        lastSingerName = userName || '';
        audio.src = song.audio_path;
        document.getElementById('title').textContent = song.title;
        document.getElementById('nowDot').style.display = '';
        const metaParts = [song.artist];
        if (userName) metaParts.push(`<span class="singer-name">${userName}</span>`);
        document.getElementById('nowMeta').innerHTML = metaParts.join(' · ');
        document.getElementById('singer').innerHTML = userName
            ? `Поёт: <span>${userName}</span>` : '';

        // Parse lyrics
        const words = (song.lyrics || []).filter(w =>
            w.word && w.word.length < 20
        );
        allWords = words;
        lines = [];
        for (let i = 0; i < words.length; i += WORDS_PER_LINE) {
            lines.push(words.slice(i, i + WORDS_PER_LINE));
        }

        document.getElementById('idle').classList.add('hidden');
        try {
            await audio.play();
            document.getElementById('iPlay').style.display = 'none';
            document.getElementById('iPause').style.display = '';
        } catch (e) {
            console.warn('Autoplay blocked, waiting for user gesture:', e.message);
            document.getElementById('iPlay').style.display = '';
            document.getElementById('iPause').style.display = 'none';
        }
        updateQueueDisplay();
    }

    // --- Load directly (no queue, demo mode) ---
    async function loadFirstSong() {
        const { data: songs } = await sb.from('karaoke_songs').select('*').limit(1);
        if (songs && songs.length > 0) {
            document.getElementById('idleStatus').textContent = '1 трек в базе — нажмите Play';
        }
    }

    // --- Check queue (with mutex to prevent race conditions) ---
    let checkingQueue = false;
    async function checkQueue() {
        if (checkingQueue) return;
        checkingQueue = true;
        try {
        const { data: next } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(*)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true })
            .limit(1);

        if (next && next.length > 0) {
            // Mark as playing
            await sb.from('karaoke_queue')
                .update({ status: 'playing' })
                .eq('id', next[0].id);
            await loadSong(next[0].song_id, next[0].user_name);
        }
        } finally { checkingQueue = false; }
    }

    // --- Realtime: listen for queue changes ---
    sb.channel('karaoke_queue_changes')
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'karaoke_queue',
            filter: `room_id=eq.${ROOM_ID}`
        }, async (payload) => {
            const row = payload.new;
            // Show toast with song info
            const { data: song } = await sb.from('karaoke_songs')
                .select('title, artist').eq('id', row.song_id).single();
            if (song) {
                showPlayerToast(song.title, song.artist, row.user_name);
            }
            updateQueueDisplay();
            // If nothing is loaded, pick it up
            if (!currentSong) {
                checkQueue();
            }
        })
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'karaoke_queue',
            filter: `room_id=eq.${ROOM_ID}`
        }, () => { updateQueueDisplay(); })
        .on('postgres_changes', {
            event: 'DELETE',
            schema: 'public',
            table: 'karaoke_queue',
            filter: `room_id=eq.${ROOM_ID}`
        }, () => { updateQueueDisplay(); })
        .subscribe();

    // --- When track ends: congrats → countdown → next song ---
    let lastSingerName = '';

    // --- Congrats FX: confetti burst + emoji rain ---
    const congratsCanvas = document.getElementById('congratsCanvas');
    const cCtx = congratsCanvas.getContext('2d');
    let congratsFx = [];
    let congratsRunning = false;

    function resizeCongratsCanvas() {
        const rect = congratsCanvas.parentElement.getBoundingClientRect();
        congratsCanvas.width = rect.width;
        congratsCanvas.height = rect.height;
    }

    function spawnConfetti(w, h) {
        const colors = ['#a855f7', '#ec4899', '#f59e0b', '#22c55e', '#3b82f6', '#ef4444', '#fff'];
        for (let i = 0; i < 80; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 3 + Math.random() * 8;
            congratsFx.push({
                type: 'confetti',
                x: w / 2, y: h / 2,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 3,
                size: 4 + Math.random() * 6,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 15,
                life: 1,
                decay: 0.008 + Math.random() * 0.005,
            });
        }
    }

    function spawnEmojiRain(w, h) {
        const emojiSet = ['🎤', '🎵', '🔥', '⭐', '👏', '🎶', '✨', '💜', '🎉', '🎊'];
        for (let i = 0; i < 35; i++) {
            congratsFx.push({
                type: 'emoji',
                x: Math.random() * w,
                y: -30 - Math.random() * h * 0.8,
                vx: (Math.random() - 0.5) * 0.8,
                vy: 1.5 + Math.random() * 2.5,
                char: emojiSet[Math.floor(Math.random() * emojiSet.length)],
                size: 20 + Math.random() * 20,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.03,
                life: 1,
                decay: 0.003 + Math.random() * 0.003,
            });
        }
    }

    function renderCongratsFx() {
        if (!congratsRunning) return;
        const w = congratsCanvas.width, h = congratsCanvas.height;
        cCtx.clearRect(0, 0, w, h);

        for (let i = congratsFx.length - 1; i >= 0; i--) {
            const p = congratsFx[i];
            p.life -= p.decay;
            if (p.life <= 0) { congratsFx.splice(i, 1); continue; }

            if (p.type === 'confetti') {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15; // gravity
                p.vx *= 0.99;
                p.rotation += p.rotSpeed;
                cCtx.save();
                cCtx.translate(p.x, p.y);
                cCtx.rotate(p.rotation * Math.PI / 180);
                cCtx.globalAlpha = p.life;
                cCtx.fillStyle = p.color;
                cCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                cCtx.restore();
            } else if (p.type === 'emoji') {
                p.x += p.vx + Math.sin(p.wobble) * 0.5;
                p.y += p.vy;
                p.wobble += p.wobbleSpeed;
                cCtx.globalAlpha = Math.min(1, p.life * 2);
                cCtx.font = `${p.size}px serif`;
                cCtx.fillText(p.char, p.x, p.y);
            }
        }
        cCtx.globalAlpha = 1;

        if (congratsFx.length > 0) {
            requestAnimationFrame(renderCongratsFx);
        } else {
            congratsRunning = false;
        }
    }

    function showCongrats(singerName, songTitle, artistName) {
        const emojis = ['🎤', '🔥', '⭐', '🎶', '👏', '🎉'];
        const emojiEl = document.getElementById('congratsEmoji');
        emojiEl.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        emojiEl.style.animation = 'none';
        void emojiEl.offsetHeight;
        emojiEl.style.animation = 'congrats-bounce 0.6s ease';
        document.getElementById('congratsSinger').textContent = singerName || 'Браво!';
        document.getElementById('congratsSong').textContent =
            artistName ? `${artistName} — ${songTitle}` : songTitle;
        document.getElementById('congratsScreen').classList.add('visible');
        document.getElementById('line1').innerHTML = '';
        document.getElementById('singer').innerHTML = '';

        // Launch FX
        resizeCongratsCanvas();
        congratsFx = [];
        congratsRunning = true;
        const w = congratsCanvas.width, h = congratsCanvas.height;
        spawnConfetti(w, h);
        setTimeout(() => spawnEmojiRain(w, h), 400);
        requestAnimationFrame(renderCongratsFx);
    }

    function hideCongrats() {
        document.getElementById('congratsScreen').classList.remove('visible');
        congratsRunning = false;
        congratsFx = [];
        cCtx.clearRect(0, 0, congratsCanvas.width, congratsCanvas.height);
    }

    function showCountdown(nextSong, nextArtist, nextSinger, currentSingerName) {
        document.getElementById('countdownSong').textContent = nextSong;
        document.getElementById('countdownArtist').textContent = nextArtist;
        document.getElementById('countdownSinger').textContent =
            nextSinger ? `Поёт: ${nextSinger}` : '';
        // Show handoff message if singer changes
        const handoff = document.getElementById('countdownHandoff');
        if (nextSinger && nextSinger !== currentSingerName) {
            handoff.textContent = `Передай микрофон — ${nextSinger}!`;
        } else {
            handoff.textContent = '';
        }
        document.getElementById('countdownScreen').classList.add('visible');

        let count = 5;
        const numEl = document.getElementById('countdownNumber');
        numEl.textContent = count;
        numEl.style.animation = 'none';
        void numEl.offsetHeight;
        numEl.style.animation = '';

        return new Promise(resolve => {
            const interval = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(interval);
                    document.getElementById('countdownScreen').classList.remove('visible');
                    resolve();
                } else {
                    numEl.textContent = count;
                    numEl.style.animation = 'none';
                    void numEl.offsetHeight;
                    numEl.style.animation = '';
                }
            }, 1000);
        });
    }

    function goToIdle() {
        document.getElementById('idle').classList.remove('hidden');
        document.getElementById('idleStatus').textContent = 'Очередь пуста';
        document.getElementById('iPlay').style.display = '';
        document.getElementById('iPause').style.display = 'none';
        document.getElementById('title').textContent = '—';
        document.getElementById('nowMeta').innerHTML = '';
        document.getElementById('nowDot').style.display = 'none';
        document.getElementById('queueList').innerHTML = '';
        currentSong = null;
        lines = [];
        allWords = [];
    }

    // --- Skip: direct transition without congrats ---
    let skipping = false;

    async function skipToNext() {
        if (skipping) return;
        skipping = true;

        audio.pause();
        document.getElementById('line1').innerHTML = '';
        document.getElementById('singer').innerHTML = '';
        hideInterlude();

        // Mark current as done
        const { data: playing } = await sb.from('karaoke_queue')
            .select('id')
            .eq('room_id', ROOM_ID)
            .eq('status', 'playing')
            .limit(1);
        if (playing && playing.length > 0) {
            await sb.from('karaoke_queue')
                .update({ status: 'done' })
                .eq('id', playing[0].id);
        }

        // Check for next
        const { data: next } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(title, artist)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true })
            .limit(1);

        if (next && next.length > 0) {
            const nextTitle = next[0].karaoke_songs?.title || '—';
            const nextArtist = next[0].karaoke_songs?.artist || '';
            const nextSinger = next[0].user_name || '';

            await showCountdown(nextTitle, nextArtist, nextSinger, lastSingerName);

            await sb.from('karaoke_queue')
                .update({ status: 'playing' })
                .eq('id', next[0].id);
            await loadSong(next[0].song_id, next[0].user_name);
        } else {
            goToIdle();
        }

        updateQueueDisplay();
        skipping = false;
    }

    // --- Restart: if > 3s into song → restart, otherwise previous track ---
    let goingBack = false;

    async function restartOrPrevious() {
        if (audio.currentTime > 3) {
            audio.currentTime = 0;
            return;
        }

        if (goingBack) return;
        goingBack = true;

        try {
            // Find last done track in this room
            const { data: prev } = await sb.from('karaoke_queue')
                .select('*, karaoke_songs(title, artist)')
                .eq('room_id', ROOM_ID)
                .eq('status', 'done')
                .order('position', { ascending: false })
                .limit(1);

            if (!prev || prev.length === 0) {
                audio.currentTime = 0;
                return;
            }

            audio.pause();

            // Current playing → back to waiting
            const { data: playing } = await sb.from('karaoke_queue')
                .select('id')
                .eq('room_id', ROOM_ID)
                .eq('status', 'playing')
                .limit(1);
            if (playing && playing.length > 0) {
                await sb.from('karaoke_queue')
                    .update({ status: 'waiting' })
                    .eq('id', playing[0].id);
            }

            // Previous done → playing
            await sb.from('karaoke_queue')
                .update({ status: 'playing' })
                .eq('id', prev[0].id);

            await loadSong(prev[0].song_id, prev[0].user_name);
            updateQueueDisplay();
        } finally {
            goingBack = false;
        }
    }

    audio.addEventListener('ended', async () => {
        if (skipping) return; // Skip handles its own transition
        const finishedSinger = lastSingerName;
        const finishedTitle = currentSong?.title || '';
        const finishedArtist = currentSong?.artist || '';

        // Mark current as done
        const { data: playing } = await sb.from('karaoke_queue')
            .select('id')
            .eq('room_id', ROOM_ID)
            .eq('status', 'playing')
            .limit(1);
        if (playing && playing.length > 0) {
            await sb.from('karaoke_queue')
                .update({ status: 'done' })
                .eq('id', playing[0].id);
        }

        // Show congrats
        showCongrats(finishedSinger, finishedTitle, finishedArtist);

        // Check for next song
        const { data: next } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(title, artist)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true })
            .limit(1);

        if (next && next.length > 0) {
            // Wait 5s on congrats, then countdown
            await new Promise(r => setTimeout(r, 5000));
            hideCongrats();

            const nextTitle = next[0].karaoke_songs?.title || '—';
            const nextArtist = next[0].karaoke_songs?.artist || '';
            const nextSinger = next[0].user_name || '';

            await showCountdown(nextTitle, nextArtist, nextSinger, finishedSinger);

            // Now play
            await sb.from('karaoke_queue')
                .update({ status: 'playing' })
                .eq('id', next[0].id);
            await loadSong(next[0].song_id, next[0].user_name);
        } else {
            // No next — show congrats for 5s then idle
            await new Promise(r => setTimeout(r, 5000));
            hideCongrats();
            goToIdle();
        }

        updateQueueDisplay();
    });

    // --- Render ---
    function renderLine(el, lineWords, t) {
        el.innerHTML = '';
        if (!lineWords) return;
        lineWords.forEach(w => {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = w.word + ' ';
            if (t >= w.end) {
                span.classList.add('sung');
            } else if (t >= w.start) {
                span.classList.add('now');
                const progress = Math.min(1, (t - w.start) / (w.end - w.start));
                span.style.setProperty('--fill', (progress * 100) + '%');
                span.style.setProperty('--fill-num', progress.toFixed(2));
            }
            el.appendChild(span);
        });
    }

    function findCurrentLineIdx(t) {
        for (let i = lines.length - 1; i >= 0; i--) {
            if (t >= lines[i][0].start - 0.3) return i;
        }
        return 0;
    }

    // --- Interlude detection ---
    const INTERLUDE_THRESHOLD = 6; // show interlude if gap > this
    const LYRICS_PREVIEW_SECS = 4; // show lyrics this many secs before vocals
    let interludeVisible = false;
    let allWords = [];

    function findGap(t) {
        // Find the gap we're currently in (if any)
        // Returns { gapStart, nextWordStart, gapTotal } or null
        if (allWords.length === 0) return null;

        // Before first word
        if (t < allWords[0].start) {
            return { gapStart: 0, nextWordStart: allWords[0].start, gapTotal: allWords[0].start };
        }

        // Between words
        for (let i = 0; i < allWords.length - 1; i++) {
            if (t >= allWords[i].end && t < allWords[i + 1].start) {
                const gs = allWords[i].end;
                const ns = allWords[i + 1].start;
                return { gapStart: gs, nextWordStart: ns, gapTotal: ns - gs };
            }
        }
        return null;
    }

    function updateInterlude(t) {
        if (allWords.length === 0 || audio.paused) {
            if (interludeVisible) hideInterlude();
            return;
        }

        const gap = findGap(t);
        if (!gap || gap.gapTotal < INTERLUDE_THRESHOLD) {
            if (interludeVisible) hideInterlude();
            return;
        }

        const secsLeft = gap.nextWordStart - t;

        // Hide interlude when vocals are about to start (< 0.5s)
        if (secsLeft < 0.5) {
            if (interludeVisible) hideInterlude();
            return;
        }

        const el = document.getElementById('interlude');
        const timer = document.getElementById('interludeTimer');
        const ring = document.getElementById('interludeRing');
        const countdown = document.getElementById('interludeCountdown');
        const line1 = document.getElementById('line1');

        // Progress ring
        const elapsed = t - gap.gapStart;
        const progress = Math.min(1, elapsed / gap.gapTotal);
        ring.style.strokeDashoffset = (440 * (1 - progress)).toFixed(0);

        // Timer
        timer.textContent = Math.ceil(secsLeft);

        // Big countdown in last 5 seconds — replace ring with numbers
        const ringEl = document.querySelector('.interlude-ring');
        if (secsLeft <= 5.5 && secsLeft > 0.5) {
            countdown.textContent = Math.ceil(secsLeft - 0.5);
            countdown.classList.add('visible');
            ringEl.classList.add('fade-out');
            timer.style.opacity = '0';
        } else {
            countdown.classList.remove('visible');
            ringEl.classList.remove('fade-out');
            timer.style.opacity = '1';
        }

        // Hide lyrics during interlude, show only in last LYRICS_PREVIEW_SECS
        if (secsLeft > LYRICS_PREVIEW_SECS) {
            line1.style.opacity = '0';
        } else {
            line1.style.opacity = '1';
        }

        if (!interludeVisible) {
            el.classList.add('visible');
            interludeVisible = true;
        }
    }

    function hideInterlude() {
        document.getElementById('interlude').classList.remove('visible');
        document.getElementById('interludeCountdown').classList.remove('visible');
        document.getElementById('line1').style.opacity = '1';
        interludeVisible = false;
    }

    function tick() {
        const t = audio.currentTime;
        if (audio.duration) {
            document.getElementById('fill').style.width = (t / audio.duration * 100) + '%';
            document.getElementById('cur').textContent = fmt(t);
            document.getElementById('dur').textContent = fmt(audio.duration);
        }
        if (lines.length > 0) {
            const idx = findCurrentLineIdx(t);
            renderLine(document.getElementById('line1'), lines[idx] || null, t);
        }
        updateInterlude(t);
        requestAnimationFrame(tick);
    }

    function fmt(s) {
        return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }

    // --- Controls ---
    document.getElementById('play').onclick = async () => {
        if (audio.paused) {
            if (!currentSong) {
                // Demo: load first song from DB
                const { data: songs } = await sb.from('karaoke_songs').select('*').limit(1);
                if (songs && songs.length > 0) {
                    await loadSong(songs[0].id, null);
                    return;
                }
            }
            audio.play();
            document.getElementById('idle').classList.add('hidden');
            document.getElementById('iPlay').style.display = 'none';
            document.getElementById('iPause').style.display = '';
        } else {
            audio.pause();
            document.getElementById('iPlay').style.display = '';
            document.getElementById('iPause').style.display = 'none';
        }
    };
    document.getElementById('restart').onclick = () => { restartOrPrevious(); };
    document.getElementById('skip').onclick = () => { skipToNext(); };
    document.getElementById('bar').onclick = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    };
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); document.getElementById('play').click(); }
        if (e.code === 'ArrowRight') audio.currentTime += 5;
        if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 5);
    });

    // --- Visual FX: Particles + glow (no AudioContext — safe for autoplay) ---
    const fxCanvas = document.getElementById('fxCanvas');
    const fxCtx = fxCanvas.getContext('2d');
    const glowEl = document.getElementById('reactiveGlow');
    const particles = [];
    const MAX_PARTICLES = 50;
    let fxFrame = 0;

    function resizeFxCanvas() {
        const rect = fxCanvas.parentElement.getBoundingClientRect();
        fxCanvas.width = rect.width;
        fxCanvas.height = rect.height;
    }
    resizeFxCanvas();
    window.addEventListener('resize', resizeFxCanvas);

    function spawnParticle() {
        const w = fxCanvas.width, h = fxCanvas.height;
        particles.push({
            x: w * 0.2 + Math.random() * w * 0.6,
            y: h + 10,
            vx: (Math.random() - 0.5) * 1.2,
            vy: -(0.8 + Math.random() * 1.5),
            size: 2 + Math.random() * 4,
            life: 1,
            decay: 0.004 + Math.random() * 0.006,
            hue: 270 + Math.random() * 60,
        });
    }

    function renderFx() {
        const w = fxCanvas.width, h = fxCanvas.height;
        fxCtx.clearRect(0, 0, w, h);
        fxFrame++;

        const isPlaying = !audio.paused && !audio.ended && audio.currentTime > 0;

        // Spawn particles when music is playing
        if (isPlaying && fxFrame % 3 === 0 && particles.length < MAX_PARTICLES) {
            spawnParticle();
        }

        // Update & draw
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx += (Math.random() - 0.5) * 0.1;
            p.life -= p.decay;

            if (p.life <= 0) {
                particles.splice(i, 1);
                continue;
            }

            const alpha = p.life * 0.5;
            fxCtx.beginPath();
            fxCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            fxCtx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${alpha})`;
            fxCtx.fill();

            // Soft glow
            fxCtx.beginPath();
            fxCtx.arc(p.x, p.y, p.size * p.life * 2.5, 0, Math.PI * 2);
            fxCtx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${alpha * 0.12})`;
            fxCtx.fill();
        }

        // Reactive glow — gentle pulse when playing
        const pulse = isPlaying ? 0.12 + Math.sin(fxFrame * 0.03) * 0.04 : 0.06;
        glowEl.style.setProperty('--glow-opacity', pulse.toFixed(3));

        requestAnimationFrame(renderFx);
    }

    requestAnimationFrame(renderFx);

    // --- Remote commands via Realtime broadcast ---
    const cmdChannel = sb.channel(`room_commands_${ROOM_ID}`);

    function broadcastState(state) {
        cmdChannel.send({
            type: 'broadcast',
            event: 'player_state',
            payload: { state }
        });
    }

    cmdChannel.on('broadcast', { event: 'player_command' }, ({ payload }) => {
        const { command, value } = payload;
        switch (command) {
            case 'play':
                if (audio.paused) {
                    if (!currentSong) return;
                    audio.play();
                    document.getElementById('idle').classList.add('hidden');
                    document.getElementById('iPlay').style.display = 'none';
                    document.getElementById('iPause').style.display = '';
                }
                break;
            case 'pause':
                if (!audio.paused) {
                    audio.pause();
                    document.getElementById('iPlay').style.display = '';
                    document.getElementById('iPause').style.display = 'none';
                }
                break;
            case 'seek':
                audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + value));
                break;
            case 'restart':
                restartOrPrevious();
                break;
            case 'skip':
                skipToNext();
                break;
        }
    }).subscribe();

    // Broadcast state changes to remote
    audio.addEventListener('play', () => broadcastState('playing'));
    audio.addEventListener('pause', () => broadcastState('paused'));
    audio.addEventListener('ended', () => broadcastState('ended'));

    // --- Init ---
    loadFirstSong();
    checkQueue();
    updateQueueDisplay();
    requestAnimationFrame(tick);
    </script>
</body>
</html>
