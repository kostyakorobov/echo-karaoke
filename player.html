<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эхо Караоке — Плеер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .song-info { text-align: right; }
        .song-title { font-weight: 600; font-size: 16px; }
        .song-artist { color: #a3a3a3; font-size: 14px; }

        /* Queue indicator */
        .queue-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 20px;
            font-size: 13px;
            color: #d4d4d4;
        }
        .queue-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Lyrics */
        .lyrics-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 60px;
            position: relative;
            min-height: 0;
        }
        .lyrics-area::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .line {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.5;
            text-align: center;
            max-width: 900px;
        }
        .line.active { opacity: 1; }

        .word {
            display: inline;
            position: relative;
            color: #666666;
        }
        .word.sung { color: #ffffff; }
        /* Per-character fill via gradient mask */
        .word.now {
            color: #666666;
            background: linear-gradient(90deg, #fff var(--fill), #666666 var(--fill));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, calc(0.7 * var(--fill-num))));
        }

        /* Singer name */
        .singer {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 14px;
            color: #a3a3a3;
        }
        .singer span { color: #c084fc; font-weight: 600; }

        /* Controls */
        .controls {
            flex-shrink: 0;
            padding: 16px 40px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .progress-wrap { width: 100%; max-width: 700px; }
        .progress-bar {
            width: 100%; height: 6px;
            background: #404040;
            border-radius: 3px;
            cursor: pointer;
        }
        .progress-bar:hover { height: 8px; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border-radius: 3px;
            width: 0%;
            pointer-events: none;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px; color: #a3a3a3;
            font-variant-numeric: tabular-nums;
            margin-top: 4px;
        }
        .buttons {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .btn {
            background: none; border: none;
            color: #a3a3a3; cursor: pointer;
            padding: 8px; transition: color 0.2s;
        }
        .btn:hover { color: #fff; }
        .btn-play {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #fff;
            color: #0a0a0a !important;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
        }
        .btn-play:hover { background: #d4d4d4; }

        /* Idle */
        .idle {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a0a; z-index: 10;
            transition: opacity 0.6s ease;
        }
        .idle.hidden { opacity: 0; pointer-events: none; }
        .idle h1 {
            font-size: 72px; font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .idle p { color: #a3a3a3; font-size: 18px; margin-top: 12px; }
        .idle .waiting { color: #c084fc; font-size: 16px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ЭХО.КАРАОКЕ</div>
        <div class="queue-badge">
            <div class="queue-dot"></div>
            <span id="roomId">Зал не выбран</span>
        </div>
        <div class="song-info">
            <div class="song-title" id="title">—</div>
            <div class="song-artist" id="artist">—</div>
        </div>
    </div>

    <div class="lyrics-area">
        <div class="idle" id="idle">
            <h1>ЭХО</h1>
            <p>Ожидание треков в очереди...</p>
            <div class="waiting" id="idleStatus"></div>
        </div>
        <div class="line active" id="line1"></div>
        <div class="singer" id="singer"></div>
    </div>

    <div class="controls">
        <div class="progress-wrap">
            <div class="progress-bar" id="bar">
                <div class="progress-fill" id="fill"></div>
            </div>
            <div class="time-row">
                <span id="cur">0:00</span>
                <span id="dur">0:00</span>
            </div>
        </div>
        <div class="buttons">
            <button class="btn" id="restart">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="btn btn-play" id="play">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="iPlay"><polygon points="9,5 20,12 9,19"/></svg>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="iPause" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="btn" id="skip">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <audio id="audio" preload="auto" crossorigin="anonymous"></audio>

    <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://uefvicwsbkjsbvfdhebj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZnZpY3dzYmtqc2J2ZmRoZWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAxNDg0ODksImV4cCI6MjA3NTcyNDQ4OX0.53_b0KI7DUwI4SzFXNoIDbIgm5N1qwhnppx6WmP-FX0';
    const ROOM_ID = new URLSearchParams(window.location.search).get('room') || 'hall_1';
    const WORDS_PER_LINE = 7;

    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    const audio = document.getElementById('audio');
    let lines = [];
    let currentSong = null;

    document.getElementById('roomId').textContent = ROOM_ID;

    // --- Load a song by ID ---
    async function loadSong(songId, userName) {
        const { data: song } = await sb.from('karaoke_songs').select('*').eq('id', songId).single();
        if (!song) return;

        currentSong = song;
        audio.src = song.audio_path;
        document.getElementById('title').textContent = song.title;
        document.getElementById('artist').textContent = song.artist;
        document.getElementById('singer').innerHTML = userName
            ? `Поёт: <span>${userName}</span>` : '';

        // Parse lyrics
        const words = (song.lyrics || []).filter(w =>
            w.word && w.word.length < 20
        );
        lines = [];
        for (let i = 0; i < words.length; i += WORDS_PER_LINE) {
            lines.push(words.slice(i, i + WORDS_PER_LINE));
        }

        document.getElementById('idle').classList.add('hidden');
        audio.play();
        document.getElementById('iPlay').style.display = 'none';
        document.getElementById('iPause').style.display = '';
    }

    // --- Load directly (no queue, demo mode) ---
    async function loadFirstSong() {
        const { data: songs } = await sb.from('karaoke_songs').select('*').limit(1);
        if (songs && songs.length > 0) {
            document.getElementById('idleStatus').textContent = '1 трек в базе — нажмите Play';
        }
    }

    // --- Check queue ---
    async function checkQueue() {
        const { data: next } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(*)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true })
            .limit(1);

        if (next && next.length > 0) {
            // Mark as playing
            await sb.from('karaoke_queue')
                .update({ status: 'playing' })
                .eq('id', next[0].id);
            await loadSong(next[0].song_id, next[0].user_name);
        }
    }

    // --- Realtime: listen for new queue items ---
    sb.channel('karaoke_queue_changes')
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'karaoke_queue',
            filter: `room_id=eq.${ROOM_ID}`
        }, (payload) => {
            // If nothing is playing, pick it up
            if (audio.paused || audio.ended) {
                checkQueue();
            }
        })
        .subscribe();

    // --- When track ends, play next ---
    audio.addEventListener('ended', async () => {
        // Mark current as done
        const { data: playing } = await sb.from('karaoke_queue')
            .select('id')
            .eq('room_id', ROOM_ID)
            .eq('status', 'playing')
            .limit(1);
        if (playing && playing.length > 0) {
            await sb.from('karaoke_queue')
                .update({ status: 'done' })
                .eq('id', playing[0].id);
        }

        // Check for next
        const { data: next } = await sb.from('karaoke_queue')
            .select('*')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true })
            .limit(1);

        if (next && next.length > 0) {
            await sb.from('karaoke_queue')
                .update({ status: 'playing' })
                .eq('id', next[0].id);
            await loadSong(next[0].song_id, next[0].user_name);
        } else {
            // Back to idle
            document.getElementById('idle').classList.remove('hidden');
            document.getElementById('idleStatus').textContent = 'Очередь пуста';
            document.getElementById('iPlay').style.display = '';
            document.getElementById('iPause').style.display = 'none';
            currentSong = null;
            lines = [];
        }
    });

    // --- Render ---
    function renderLine(el, lineWords, t) {
        el.innerHTML = '';
        if (!lineWords) return;
        lineWords.forEach(w => {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = w.word + ' ';
            if (t >= w.end) {
                span.classList.add('sung');
            } else if (t >= w.start) {
                span.classList.add('now');
                const progress = Math.min(1, (t - w.start) / (w.end - w.start));
                span.style.setProperty('--fill', (progress * 100) + '%');
                span.style.setProperty('--fill-num', progress.toFixed(2));
            }
            el.appendChild(span);
        });
    }

    function findCurrentLineIdx(t) {
        for (let i = lines.length - 1; i >= 0; i--) {
            if (t >= lines[i][0].start - 0.3) return i;
        }
        return 0;
    }

    function tick() {
        const t = audio.currentTime;
        if (audio.duration) {
            document.getElementById('fill').style.width = (t / audio.duration * 100) + '%';
            document.getElementById('cur').textContent = fmt(t);
            document.getElementById('dur').textContent = fmt(audio.duration);
        }
        if (lines.length > 0) {
            const idx = findCurrentLineIdx(t);
            renderLine(document.getElementById('line1'), lines[idx] || null, t);
        }
        requestAnimationFrame(tick);
    }

    function fmt(s) {
        return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }

    // --- Controls ---
    document.getElementById('play').onclick = async () => {
        if (audio.paused) {
            if (!currentSong) {
                // Demo: load first song from DB
                const { data: songs } = await sb.from('karaoke_songs').select('*').limit(1);
                if (songs && songs.length > 0) {
                    await loadSong(songs[0].id, null);
                    return;
                }
            }
            audio.play();
            document.getElementById('idle').classList.add('hidden');
            document.getElementById('iPlay').style.display = 'none';
            document.getElementById('iPause').style.display = '';
        } else {
            audio.pause();
            document.getElementById('iPlay').style.display = '';
            document.getElementById('iPause').style.display = 'none';
        }
    };
    document.getElementById('restart').onclick = () => { audio.currentTime = 0; };
    document.getElementById('skip').onclick = () => { audio.currentTime = audio.duration; };
    document.getElementById('bar').onclick = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    };
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); document.getElementById('play').click(); }
        if (e.code === 'ArrowRight') audio.currentTime += 5;
        if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 5);
    });

    // --- Init ---
    loadFirstSong();
    checkQueue();
    requestAnimationFrame(tick);
    </script>
</body>
</html>
