<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Эхо — Пульт караоке</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .room-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: #1a1a1a;
            border: 1px solid #262626;
            color: #a3a3a3;
        }
        .user-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #c084fc;
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-badge:active {
            background: rgba(168, 85, 247, 0.2);
        }

        /* Now playing */
        .now-playing {
            padding: 16px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: none;
            flex-shrink: 0;
        }
        .now-playing.visible { display: block; }
        .now-playing-label {
            font-size: 11px;
            font-weight: 600;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .now-playing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #a855f7;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .now-playing-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .now-playing-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            animation: pulse-icon 2s ease-in-out infinite;
        }
        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .now-playing-text { flex: 1; min-width: 0; }
        .now-playing-title {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .now-playing-artist {
            font-size: 13px;
            color: #737373;
            margin-top: 2px;
        }
        .now-playing-singer {
            font-size: 12px;
            color: #a855f7;
            margin-top: 2px;
        }

        /* Search */
        .search-wrap {
            padding: 16px 20px;
            flex-shrink: 0;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #262626;
            background: #141414;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: #a855f7;
        }
        .search-input::placeholder {
            color: #525252;
        }

        /* Content area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px;
        }

        /* Section headers */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #525252;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 10px;
        }

        /* Song card */
        .song-card {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            margin-bottom: 8px;
            gap: 12px;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .song-card:active {
            border-color: #a855f7;
            background: #1a1a1a;
        }
        .song-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }
        .song-details {
            flex: 1;
            min-width: 0;
        }
        .song-name {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist-name {
            font-size: 13px;
            color: #737373;
            margin-top: 2px;
        }
        .song-add {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: #a855f7;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .song-add:hover { background: #9333ea; }
        .song-add:disabled {
            background: #262626;
            color: #525252;
            cursor: default;
        }

        /* Queue item */
        .queue-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            margin-bottom: 8px;
            gap: 12px;
        }
        .queue-pos {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #a3a3a3;
            flex-shrink: 0;
        }
        .queue-details { flex: 1; min-width: 0; }
        .queue-song {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .queue-singer {
            font-size: 12px;
            color: #737373;
            margin-top: 2px;
        }
        .queue-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .queue-status.waiting {
            background: rgba(163, 163, 163, 0.1);
            color: #737373;
        }
        .queue-remove {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #525252;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .queue-remove:active {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        /* Name input modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
        }
        .modal h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .modal input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #262626;
            background: #0a0a0a;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }
        .modal input:focus { border-color: #a855f7; }
        .modal-buttons {
            display: flex;
            gap: 8px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.cancel {
            background: #262626;
            color: #a3a3a3;
        }
        .modal-btn.confirm {
            background: #a855f7;
            color: #fff;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #d4d4d4;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #525252;
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ЭХО.КАРАОКЕ</div>
        <div class="header-right">
            <div class="room-badge" id="roomBadge">hall_1</div>
            <div class="user-badge" id="userBadge" title="Нажми, чтобы сменить имя">Гость</div>
        </div>
    </div>

    <!-- Now playing -->
    <div class="now-playing" id="nowPlaying">
        <div class="now-playing-label">
            <div class="now-playing-dot"></div>
            Сейчас играет
        </div>
        <div class="now-playing-info">
            <div class="now-playing-icon">🎤</div>
            <div class="now-playing-text">
                <div class="now-playing-title" id="npTitle">—</div>
                <div class="now-playing-artist" id="npArtist">—</div>
                <div class="now-playing-singer" id="npSinger"></div>
            </div>
        </div>
    </div>

    <div class="search-wrap">
        <input class="search-input" id="search" type="text"
               placeholder="Поиск песни или артиста..." autocomplete="off">
    </div>

    <div class="content">
        <!-- Search results (replaces catalog when active) -->
        <div id="searchResults"></div>

        <!-- Catalog (hidden during search) -->
        <div id="catalogSection">
            <div class="section-title">Каталог</div>
            <div id="catalog"></div>
        </div>

        <!-- Queue -->
        <div class="section-title">Очередь</div>
        <div id="queue">
            <div class="empty">
                <div class="empty-icon">🎤</div>
                Очередь пуста — найди песню!
            </div>
        </div>
    </div>

    <!-- Name modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3>Как тебя зовут?</h3>
            <input id="nameInput" type="text" placeholder="Имя" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancel">Отмена</button>
                <button class="modal-btn confirm" id="modalConfirm">В очередь!</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://uefvicwsbkjsbvfdhebj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZnZpY3dzYmtqc2J2ZmRoZWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAxNDg0ODksImV4cCI6MjA3NTcyNDQ4OX0.53_b0KI7DUwI4SzFXNoIDbIgm5N1qwhnppx6WmP-FX0';
    const ROOM_ID = new URLSearchParams(window.location.search).get('room') || 'hall_1';

    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    let pendingSongId = null;

    // --- Telegram Mini App integration ---
    const tg = window.Telegram?.WebApp;
    const isTelegram = !!(tg && tg.initDataUnsafe?.user);

    if (isTelegram) {
        tg.ready();
        tg.expand();
    }

    // Get user name: Telegram first, then localStorage, then 'Гость'
    let userName = isTelegram
        ? (tg.initDataUnsafe.user.first_name || 'Гость')
        : (localStorage.getItem('echo_name') || '');

    document.getElementById('roomBadge').textContent = ROOM_ID;
    updateUserBadge();

    // In Telegram mode, hide the name badge tap (name comes from Telegram)
    // --- User badge ---
    function updateUserBadge() {
        const badge = document.getElementById('userBadge');
        badge.textContent = userName || 'Гость';
        if (isTelegram) {
            badge.style.cursor = 'default';
            badge.style.pointerEvents = 'none';
        }
    }

    // Tap user badge to change name (only outside Telegram)
    document.getElementById('userBadge').onclick = () => {
        if (isTelegram) return;
        pendingSongId = null;
        document.getElementById('nameInput').value = userName;
        document.getElementById('modal').classList.add('visible');
        document.getElementById('modalConfirm').textContent = userName ? 'Сохранить' : 'В очередь!';
        document.getElementById('nameInput').focus();
    };

    // --- Toast ---
    let toastTimer;
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // --- Search ---
    let searchTimeout;
    const searchInput = document.getElementById('search');
    const catalogSection = document.getElementById('catalogSection');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        if (q.length < 2) {
            searchResults.innerHTML = '';
            catalogSection.style.display = '';
            return;
        }
        catalogSection.style.display = 'none';
        searchTimeout = setTimeout(() => searchSongs(q), 300);
    });

    async function searchSongs(query) {
        const { data: songs } = await sb.from('karaoke_songs')
            .select('id, title, artist')
            .or(`title.ilike.%${query}%,artist.ilike.%${query}%`)
            .limit(10);

        if (!songs || songs.length === 0) {
            searchResults.innerHTML = `
                <div class="section-title">Результаты</div>
                <div class="empty">Ничего не найдено</div>`;
            return;
        }

        searchResults.innerHTML = `<div class="section-title">Результаты</div>` +
            songs.map(s => songCardHTML(s)).join('');
    }

    function songCardHTML(s) {
        return `
            <div class="song-card" data-id="${s.id}">
                <div class="song-icon">🎵</div>
                <div class="song-details">
                    <div class="song-name">${esc(s.title)}</div>
                    <div class="song-artist-name">${esc(s.artist)}</div>
                </div>
                <button class="song-add" onclick="window._addToQueue('${s.id}', '${esc(s.title)}')">
                    Спеть
                </button>
            </div>`;
    }

    // --- Add to queue ---
    window._addToQueue = function(songId, songTitle) {
        pendingSongId = songId;
        window._pendingSongTitle = songTitle;
        if (userName || isTelegram) {
            addToQueue(songId, userName || 'Гость');
        } else {
            document.getElementById('modalConfirm').textContent = 'В очередь!';
            document.getElementById('modal').classList.add('visible');
            document.getElementById('nameInput').focus();
        }
    };

    document.getElementById('modalCancel').onclick = () => {
        document.getElementById('modal').classList.remove('visible');
    };
    document.getElementById('modalConfirm').onclick = () => {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;
        userName = name;
        localStorage.setItem('echo_name', name);
        updateUserBadge();
        document.getElementById('modal').classList.remove('visible');
        if (pendingSongId) {
            addToQueue(pendingSongId, name);
        }
    };
    document.getElementById('nameInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('modalConfirm').click();
    });

    async function addToQueue(songId, name) {
        const { data: last } = await sb.from('karaoke_queue')
            .select('position')
            .eq('room_id', ROOM_ID)
            .order('position', { ascending: false })
            .limit(1);

        const pos = (last && last.length > 0) ? last[0].position + 1 : 1;

        await sb.from('karaoke_queue').insert({
            room_id: ROOM_ID,
            song_id: songId,
            user_name: name,
            position: pos,
            status: 'waiting'
        });

        // Clear search
        searchInput.value = '';
        searchResults.innerHTML = '';
        catalogSection.style.display = '';

        showToast(`${window._pendingSongTitle || 'Песня'} добавлена в очередь`);
        loadQueue();
    }

    // --- Remove from queue ---
    window._removeFromQueue = async function(queueId) {
        await sb.from('karaoke_queue').delete().eq('id', queueId);
        showToast('Убрано из очереди');
        loadQueue();
    };

    // --- Now playing ---
    async function loadNowPlaying() {
        const { data: playing } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(title, artist)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'playing')
            .limit(1);

        const np = document.getElementById('nowPlaying');
        if (playing && playing.length > 0) {
            const item = playing[0];
            document.getElementById('npTitle').textContent = item.karaoke_songs?.title || '—';
            document.getElementById('npArtist').textContent = item.karaoke_songs?.artist || '—';
            document.getElementById('npSinger').textContent = item.user_name
                ? `Поёт: ${item.user_name}` : '';
            np.classList.add('visible');
        } else {
            np.classList.remove('visible');
        }
    }

    // --- Queue display ---
    async function loadQueue() {
        loadNowPlaying();

        const { data: items } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(title, artist)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true });

        const container = document.getElementById('queue');
        if (!items || items.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <div class="empty-icon">🎤</div>
                    Очередь пуста — найди песню!
                </div>`;
            return;
        }

        container.innerHTML = items.map((item, i) => `
            <div class="queue-item">
                <div class="queue-pos">${i + 1}</div>
                <div class="queue-details">
                    <div class="queue-song">${esc(item.karaoke_songs?.title || '—')}</div>
                    <div class="queue-singer">${esc(item.user_name || 'Аноним')}</div>
                </div>
                <div class="queue-status waiting">Ожидание</div>
                <button class="queue-remove" onclick="window._removeFromQueue('${item.id}')" title="Убрать">✕</button>
            </div>
        `).join('');
    }

    // --- Realtime queue updates ---
    sb.channel('queue_remote')
        .on('postgres_changes', {
            event: '*',
            schema: 'public',
            table: 'karaoke_queue',
            filter: `room_id=eq.${ROOM_ID}`
        }, () => { loadQueue(); })
        .subscribe();

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // --- Catalog ---
    async function loadCatalog() {
        const { data: songs } = await sb.from('karaoke_songs')
            .select('id, title, artist')
            .order('artist', { ascending: true });

        const container = document.getElementById('catalog');
        if (!songs || songs.length === 0) {
            container.innerHTML = '<div class="empty">Пока пусто</div>';
            return;
        }

        container.innerHTML = songs.map(s => songCardHTML(s)).join('');
    }

    // Init
    loadCatalog();
    loadQueue();
    </script>
</body>
</html>
