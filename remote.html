<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Эхо — Пульт караоке</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .room-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: #1a1a1a;
            border: 1px solid #262626;
            color: #a3a3a3;
        }
        .user-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #c084fc;
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-badge:active {
            background: rgba(168, 85, 247, 0.2);
        }

        /* Now playing */
        .now-playing {
            padding: 16px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: none;
            flex-shrink: 0;
        }
        .now-playing.visible { display: block; }
        .now-playing-label {
            font-size: 11px;
            font-weight: 600;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .now-playing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #a855f7;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .now-playing-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .now-playing-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            animation: pulse-icon 2s ease-in-out infinite;
        }
        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .now-playing-text { flex: 1; min-width: 0; }
        .now-playing-title {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .now-playing-artist {
            font-size: 13px;
            color: #737373;
            margin-top: 2px;
        }
        .now-playing-singer {
            font-size: 12px;
            color: #a855f7;
            margin-top: 2px;
        }

        /* Search */
        .search-wrap {
            padding: 16px 20px;
            flex-shrink: 0;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #262626;
            background: #141414;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: #a855f7;
        }
        .search-input::placeholder {
            color: #525252;
        }

        /* Content area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px;
        }

        /* Section headers */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #525252;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 10px;
        }

        /* Song card */
        .song-card {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            margin-bottom: 8px;
            gap: 12px;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .song-card:active {
            border-color: #a855f7;
            background: #1a1a1a;
        }
        .song-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }
        .song-details {
            flex: 1;
            min-width: 0;
        }
        .song-name {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist-name {
            font-size: 13px;
            color: #737373;
            margin-top: 2px;
        }
        .song-add {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: #a855f7;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .song-add:hover { background: #9333ea; }
        .song-add:disabled {
            background: #262626;
            color: #525252;
            cursor: default;
        }

        /* Queue item */
        .queue-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #141414;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            margin-bottom: 8px;
            gap: 12px;
        }
        .queue-pos {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #a3a3a3;
            flex-shrink: 0;
        }
        .queue-details { flex: 1; min-width: 0; }
        .queue-song {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .queue-singer {
            font-size: 12px;
            color: #737373;
            margin-top: 2px;
        }
        .queue-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .queue-status.waiting {
            background: rgba(163, 163, 163, 0.1);
            color: #737373;
        }
        .queue-remove {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #525252;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .queue-remove:active {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .queue-move {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #525252;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .queue-move:active {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }
        .queue-move:disabled {
            opacity: 0.2;
            pointer-events: none;
        }
        .queue-actions {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
        }

        /* Playback controls */
        .playback-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
            display: none;
        }
        .playback-controls.visible { display: flex; }
        .ctrl-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: #1a1a1a;
            color: #d4d4d4;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .ctrl-btn:active {
            background: #262626;
            transform: scale(0.95);
        }
        .ctrl-btn.primary {
            width: 52px; height: 52px;
            background: #a855f7;
            color: #fff;
        }
        .ctrl-btn.primary:active {
            background: #9333ea;
        }
        .ctrl-btn svg {
            width: 22px; height: 22px;
            fill: currentColor;
        }
        .ctrl-btn.primary svg {
            width: 26px; height: 26px;
        }
        .seek-label {
            font-size: 10px;
            color: #737373;
            position: absolute;
            bottom: -14px;
        }

        /* Confirm modal */
        .confirm-text {
            font-size: 15px;
            color: #a3a3a3;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .modal-btn.danger {
            background: #ef4444;
            color: #fff;
        }

        /* Name input modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
        }
        .modal h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .modal input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #262626;
            background: #0a0a0a;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }
        .modal input:focus { border-color: #a855f7; }
        .modal-buttons {
            display: flex;
            gap: 8px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.cancel {
            background: #262626;
            color: #a3a3a3;
        }
        .modal-btn.confirm {
            background: #a855f7;
            color: #fff;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #d4d4d4;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #525252;
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ЭХО.КАРАОКЕ</div>
        <div class="header-right">
            <div class="room-badge" id="roomBadge">hall_1</div>
            <div class="user-badge" id="userBadge" title="Нажми, чтобы сменить имя">Гость</div>
        </div>
    </div>

    <!-- Now playing -->
    <div class="now-playing" id="nowPlaying">
        <div class="now-playing-label">
            <div class="now-playing-dot"></div>
            Сейчас играет
        </div>
        <div class="now-playing-info">
            <div class="now-playing-icon">🎤</div>
            <div class="now-playing-text">
                <div class="now-playing-title" id="npTitle">—</div>
                <div class="now-playing-artist" id="npArtist">—</div>
                <div class="now-playing-singer" id="npSinger"></div>
            </div>
        </div>
    </div>

    <!-- Playback controls -->
    <div class="playback-controls" id="playbackControls">
        <button class="ctrl-btn" id="ctrlRewind" title="-10 сек">
            <svg viewBox="0 0 24 24"><path d="M12.5 3C7.81 3 4.01 6.54 3.68 11H1l3.89 3.89.07.14L9 11H6.73C7.06 7.93 9.52 5.5 12.5 5.5c3.31 0 6 2.69 6 6s-2.69 6-6 6c-1.66 0-3.16-.67-4.24-1.76l-1.42 1.42C8.39 18.71 10.35 19.5 12.5 19.5c4.69 0 8.5-3.81 8.5-8.5S17.19 3 12.5 3z"/><text x="12.5" y="14" text-anchor="middle" font-size="7.5" fill="currentColor" font-weight="700">10</text></svg>
        </button>
        <button class="ctrl-btn" id="ctrlRestart" title="Сначала">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn primary" id="ctrlPlayPause" title="Play/Пауза">
            <svg viewBox="0 0 24 24" id="ctrlPlayIcon"><polygon points="9,5 20,12 9,19"/></svg>
            <svg viewBox="0 0 24 24" id="ctrlPauseIcon" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn" id="ctrlSkip" title="Следующий">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="ctrlForward" title="+10 сек">
            <svg viewBox="0 0 24 24"><path d="M11.5 3c4.69 0 8.5 3.81 8.5 8.5s-3.81 8.5-8.5 8.5c-2.15 0-4.11-.79-5.66-2.34l1.42-1.42C8.34 17.83 9.84 18.5 11.5 18.5c3.31 0 6-2.69 6-6s-2.69-6-6-6C8.52 6.5 6.06 8.93 5.73 12H8l-3.89 3.89-.07-.14L0 12h2.68c.33-4.46 4.13-8 8.82-8z"/><text x="11.5" y="14" text-anchor="middle" font-size="7.5" fill="currentColor" font-weight="700">10</text></svg>
        </button>
    </div>

    <div class="search-wrap">
        <input class="search-input" id="search" type="text"
               placeholder="Поиск песни или артиста..." autocomplete="off">
    </div>

    <div class="content">
        <!-- Search results (replaces catalog when active) -->
        <div id="searchResults"></div>

        <!-- Catalog (hidden during search) -->
        <div id="catalogSection">
            <div class="section-title">Каталог</div>
            <div id="catalog"></div>
        </div>

        <!-- Queue -->
        <div class="section-title">Очередь</div>
        <div id="queue">
            <div class="empty">
                <div class="empty-icon">🎤</div>
                Очередь пуста — найди песню!
            </div>
        </div>
    </div>

    <!-- Name modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3>Как тебя зовут?</h3>
            <input id="nameInput" type="text" placeholder="Имя" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancel">Отмена</button>
                <button class="modal-btn confirm" id="modalConfirm">В очередь!</button>
            </div>
        </div>
    </div>

    <!-- Confirm delete modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3>Убрать из очереди?</h3>
            <div class="confirm-text" id="confirmText"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="confirmCancel">Отмена</button>
                <button class="modal-btn danger" id="confirmDelete">Убрать</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://anlhvcspsuxpaibnvrxr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubGh2Y3Nwc3V4cGFpYm52cnhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjk1MDMsImV4cCI6MjA5MTkwNTUwM30.MgF8h9fZ-VAw4SnQwUE3-btqaFkghHFai09k0Cpds60';
    const ROOM_ID = new URLSearchParams(window.location.search).get('room') || 'hall_1';

    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    let pendingSongId = null;
    let isPlaying = false;

    // --- Realtime broadcast channel for player commands ---
    const cmdChannel = sb.channel(`room_commands_${ROOM_ID}`);
    cmdChannel.subscribe();

    function sendCommand(command, value) {
        cmdChannel.send({
            type: 'broadcast',
            event: 'player_command',
            payload: { command, value }
        });
    }

    // --- Telegram Mini App integration ---
    const tg = window.Telegram?.WebApp;
    const isTelegram = !!(tg && tg.initDataUnsafe?.user);

    if (isTelegram) {
        tg.ready();
        tg.expand();
    }

    // Get user name: Telegram first, then localStorage, then 'Гость'
    let userName = isTelegram
        ? (tg.initDataUnsafe.user.first_name || 'Гость')
        : (localStorage.getItem('echo_name') || '');

    document.getElementById('roomBadge').textContent = ROOM_ID;
    updateUserBadge();

    // In Telegram mode, hide the name badge tap (name comes from Telegram)
    // --- User badge ---
    function updateUserBadge() {
        const badge = document.getElementById('userBadge');
        badge.textContent = userName || 'Гость';
        if (isTelegram) {
            badge.style.cursor = 'default';
            badge.style.pointerEvents = 'none';
        }
    }

    // Tap user badge to change name (only outside Telegram)
    document.getElementById('userBadge').onclick = () => {
        if (isTelegram) return;
        pendingSongId = null;
        document.getElementById('nameInput').value = userName;
        document.getElementById('modal').classList.add('visible');
        document.getElementById('modalConfirm').textContent = userName ? 'Сохранить' : 'В очередь!';
        document.getElementById('nameInput').focus();
    };

    // --- Toast ---
    let toastTimer;
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // --- Search ---
    let searchTimeout;
    const searchInput = document.getElementById('search');
    const catalogSection = document.getElementById('catalogSection');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        if (q.length < 2) {
            searchResults.innerHTML = '';
            catalogSection.style.display = '';
            return;
        }
        catalogSection.style.display = 'none';
        searchTimeout = setTimeout(() => searchSongs(q), 300);
    });

    async function searchSongs(query) {
        const q = query.replace(/[%_\\]/g, '\\$&');
        const { data: songs } = await sb.from('karaoke_songs')
            .select('id, title, artist')
            .or(`title.ilike.%${q}%,artist.ilike.%${q}%`)
            .limit(10);

        if (!songs || songs.length === 0) {
            searchResults.innerHTML = `
                <div class="section-title">Результаты</div>
                <div class="empty">Ничего не найдено</div>`;
            return;
        }

        searchResults.innerHTML = `<div class="section-title">Результаты</div>` +
            songs.map(s => songCardHTML(s)).join('');
    }

    function escAttr(s) {
        return (s || '').replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function songCardHTML(s) {
        return `
            <div class="song-card" data-id="${s.id}">
                <div class="song-icon">🎵</div>
                <div class="song-details">
                    <div class="song-name">${esc(s.title)}</div>
                    <div class="song-artist-name">${esc(s.artist)}</div>
                </div>
                <button class="song-add" onclick="window._addToQueue('${s.id}', '${escAttr(s.title)}')">
                    Спеть
                </button>
            </div>`;
    }

    // --- Add to queue ---
    window._addToQueue = function(songId, songTitle) {
        pendingSongId = songId;
        window._pendingSongTitle = songTitle;
        if (userName || isTelegram) {
            addToQueue(songId, userName || 'Гость');
        } else {
            document.getElementById('modalConfirm').textContent = 'В очередь!';
            document.getElementById('modal').classList.add('visible');
            document.getElementById('nameInput').focus();
        }
    };

    document.getElementById('modalCancel').onclick = () => {
        document.getElementById('modal').classList.remove('visible');
    };
    document.getElementById('modalConfirm').onclick = () => {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;
        userName = name;
        localStorage.setItem('echo_name', name);
        updateUserBadge();
        document.getElementById('modal').classList.remove('visible');
        if (pendingSongId) {
            addToQueue(pendingSongId, name);
        }
    };
    document.getElementById('nameInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('modalConfirm').click();
    });

    async function addToQueue(songId, name) {
        await sb.rpc('karaoke_queue_add', {
            p_room_id: ROOM_ID,
            p_song_id: songId,
            p_user_name: name || null
        });

        // Clear search
        searchInput.value = '';
        searchResults.innerHTML = '';
        catalogSection.style.display = '';

        showToast(`${window._pendingSongTitle || 'Песня'} добавлена в очередь`);
        loadQueue();
    }

    // --- Playback controls ---
    document.getElementById('ctrlPlayPause').onclick = () => {
        isPlaying = !isPlaying;
        sendCommand(isPlaying ? 'play' : 'pause');
        document.getElementById('ctrlPlayIcon').style.display = isPlaying ? 'none' : '';
        document.getElementById('ctrlPauseIcon').style.display = isPlaying ? '' : 'none';
    };
    document.getElementById('ctrlRewind').onclick = () => sendCommand('seek', -10);
    document.getElementById('ctrlForward').onclick = () => sendCommand('seek', 10);
    document.getElementById('ctrlRestart').onclick = () => sendCommand('restart');
    document.getElementById('ctrlSkip').onclick = () => {
        sendCommand('skip');
        isPlaying = false;
        document.getElementById('ctrlPlayIcon').style.display = '';
        document.getElementById('ctrlPauseIcon').style.display = 'none';
    };

    // Listen for player state updates
    cmdChannel.on('broadcast', { event: 'player_state' }, ({ payload }) => {
        if (payload.state === 'playing') {
            isPlaying = true;
            document.getElementById('ctrlPlayIcon').style.display = 'none';
            document.getElementById('ctrlPauseIcon').style.display = '';
        } else if (payload.state === 'paused' || payload.state === 'ended') {
            isPlaying = false;
            document.getElementById('ctrlPlayIcon').style.display = '';
            document.getElementById('ctrlPauseIcon').style.display = 'none';
        }
    });

    // --- Remove from queue (with confirmation) ---
    let pendingDeleteId = null;
    let pendingDeleteTitle = null;

    window._confirmRemove = function(queueId, songTitle) {
        pendingDeleteId = queueId;
        document.getElementById('confirmText').textContent = songTitle;
        document.getElementById('confirmModal').classList.add('visible');
    };
    document.getElementById('confirmCancel').onclick = () => {
        document.getElementById('confirmModal').classList.remove('visible');
    };
    document.getElementById('confirmDelete').onclick = async () => {
        document.getElementById('confirmModal').classList.remove('visible');
        if (pendingDeleteId) {
            await sb.from('karaoke_queue').delete().eq('id', pendingDeleteId);
            showToast('Убрано из очереди');
            loadQueue();
        }
    };

    // --- Move in queue ---
    window._moveInQueue = async function(queueId, direction) {
        const { data: items } = await sb.from('karaoke_queue')
            .select('id, position')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true });

        if (!items) return;
        const idx = items.findIndex(i => i.id === queueId);
        if (idx < 0) return;

        const swapIdx = idx + direction;
        if (swapIdx < 0 || swapIdx >= items.length) return;

        // Swap positions
        const posA = items[idx].position;
        const posB = items[swapIdx].position;

        await sb.from('karaoke_queue').update({ position: posB }).eq('id', items[idx].id);
        await sb.from('karaoke_queue').update({ position: posA }).eq('id', items[swapIdx].id);
        loadQueue();
    };

    // --- Now playing ---
    async function loadNowPlaying() {
        const { data: playing } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(title, artist)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'playing')
            .limit(1);

        const np = document.getElementById('nowPlaying');
        const pc = document.getElementById('playbackControls');
        if (playing && playing.length > 0) {
            const item = playing[0];
            document.getElementById('npTitle').textContent = item.karaoke_songs?.title || '—';
            document.getElementById('npArtist').textContent = item.karaoke_songs?.artist || '—';
            document.getElementById('npSinger').textContent = item.user_name
                ? `Поёт: ${item.user_name}` : '';
            np.classList.add('visible');
            pc.classList.add('visible');
        } else {
            np.classList.remove('visible');
            pc.classList.remove('visible');
            isPlaying = false;
            document.getElementById('ctrlPlayIcon').style.display = '';
            document.getElementById('ctrlPauseIcon').style.display = 'none';
        }
    }

    // --- Queue display ---
    async function loadQueue() {
        loadNowPlaying();

        const { data: items } = await sb.from('karaoke_queue')
            .select('*, karaoke_songs(title, artist)')
            .eq('room_id', ROOM_ID)
            .eq('status', 'waiting')
            .order('position', { ascending: true });

        const container = document.getElementById('queue');
        if (!items || items.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <div class="empty-icon">🎤</div>
                    Очередь пуста — найди песню!
                </div>`;
            return;
        }

        container.innerHTML = items.map((item, i) => `
            <div class="queue-item">
                <div class="queue-pos">${i + 1}</div>
                <div class="queue-details">
                    <div class="queue-song">${esc(item.karaoke_songs?.title || '—')}</div>
                    <div class="queue-singer">${esc(item.user_name || 'Аноним')}</div>
                </div>
                <div class="queue-actions">
                    <button class="queue-move" onclick="window._moveInQueue('${item.id}', -1)" title="Вверх" ${i === 0 ? 'disabled' : ''}>&#9650;</button>
                    <button class="queue-move" onclick="window._moveInQueue('${item.id}', 1)" title="Вниз" ${i === items.length - 1 ? 'disabled' : ''}>&#9660;</button>
                </div>
                <button class="queue-remove" onclick="window._confirmRemove('${item.id}', '${escAttr(item.karaoke_songs?.title || 'Песня')}')" title="Убрать">✕</button>
            </div>
        `).join('');
    }

    // --- Realtime queue updates ---
    sb.channel('queue_remote')
        .on('postgres_changes', {
            event: '*',
            schema: 'public',
            table: 'karaoke_queue',
            filter: `room_id=eq.${ROOM_ID}`
        }, () => { loadQueue(); })
        .subscribe();

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // --- Catalog ---
    async function loadCatalog() {
        const { data: songs } = await sb.from('karaoke_songs')
            .select('id, title, artist')
            .order('artist', { ascending: true });

        const container = document.getElementById('catalog');
        if (!songs || songs.length === 0) {
            container.innerHTML = '<div class="empty">Пока пусто</div>';
            return;
        }

        container.innerHTML = songs.map(s => songCardHTML(s)).join('');
    }

    // Init
    loadCatalog();
    loadQueue();
    </script>
</body>
</html>
